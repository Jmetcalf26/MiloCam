
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiloCam - Tapo C120 WebRTC</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
            font-family: sans-serif;
        }
        video {
            max-width: 90%;
            max-height: 80vh;
            border: 2px solid #333;
            background: #111;
        }
        .status {
            margin-top: 10px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <h1>MiloCam Live</h1>
    <video id="remoteVideo" autoplay playsinline></video>
    <div id="status" class="status">Connecting...</div>

    <script>
        const video = document.getElementById('remoteVideo');
        const status = document.getElementById('status');
        
        const ws = new WebSocket(`ws://${location.host}`);
        const pc = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        });

        pc.ontrack = (event) => {
            console.log('Received track:', event.track.kind);
            
            if (event.streams && event.streams[0]) {
                video.srcObject = event.streams[0];
            } else {
                if (!video.srcObject) {
                    video.srcObject = new MediaStream();
                }
                video.srcObject.addTrack(event.track);
            }
            
            event.track.onunmute = () => {
                console.log('Track unmuted');
                status.innerText = 'Connected - Streaming';
            };
            
            event.track.onmute = () => {
                console.log('Track muted');
            };

            status.innerText = 'Connected - Track received, waiting for data...';
            
            video.play().catch(err => {
                console.warn('Auto-play failed, waiting for user interaction:', err);
                status.innerText = 'Connected - Click video to play with audio';
            });
        };

        pc.onicecandidate = (event) => {
            if (event.candidate) {
                ws.send(JSON.stringify({ type: 'candidate', candidate: event.candidate }));
            }
        };

        ws.onopen = async () => {
            status.innerText = 'WebSocket Connected - Negotiating WebRTC...';
            
            // Add transceivers for video and audio
            pc.addTransceiver('video', { direction: 'recvonly' });
            pc.addTransceiver('audio', { direction: 'recvonly' });

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            ws.send(JSON.stringify({ type: 'offer', offer }));
        };

        ws.onmessage = async (event) => {
            const message = JSON.parse(event.data);

            if (message.type === 'answer') {
                await pc.setRemoteDescription(message.answer);
            } else if (message.type === 'candidate') {
                await pc.addIceCandidate(message.candidate);
            }
        };

        ws.onclose = () => {
            status.innerText = 'Disconnected from server';
        };

        // Handle autoplay issues
        video.onclick = () => {
            video.play();
        };
    </script>
</body>
</html>
